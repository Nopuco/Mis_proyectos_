<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calculadora Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a1a; margin: 0; }
        .calculadora { background-color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        #pantalla { width: 100%; height: 60px; font-size: 32px; text-align: right; margin-bottom: 20px; border: none; border-radius: 10px; background: #222; color: #0f0; padding: 10px; box-sizing: border-box; }
        .botones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { height: 60px; border-radius: 12px; border: none; font-size: 20px; cursor: pointer; transition: 0.2s; background: #444; color: white; }
        button:hover { background: #555; }
        .operador { background: #ff9500; }
        .operador:hover { background: #ffaa33; }
        .especial { background: #a5a5a5; color: black; }
    </style>
</head>
<body>
    <div class="calculadora">
        <input type="text" id="pantalla" value="0" readonly>
        <div class="botones">
            <button class="especial">C</button><button class="especial">+/-</button><button class="especial">%</button><button class="operador">/</button>
            <button onclick="agregar('7')">7</button><button onclick="agregar('8')">8</button><button onclick="agregar('9')">9</button><button class="operador">*</button>
            <button onclick="agregar('4')">4</button><button onclick="agregar('5')">5</button><button onclick="agregar('6')">6</button><button class="operador">-</button>
            <button onclick="agregar('1')">1</button><button onclick="agregar('2')">2</button><button onclick="agregar('3')">3</button><button class="operador">+</button>
            <button onclick="agregar('0')" style="grid-column: span 2;">0</button><button>.</button><button class="operador">=</button>
        </div>
    </div>
    <script>
        function agregar(valor) { document.getElementById('pantalla').value += valor; }
    </script>
</body>
</html>
